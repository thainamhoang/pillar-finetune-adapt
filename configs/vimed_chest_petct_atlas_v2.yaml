base_config: vimed_chest_petct_atlas.yaml

experiment:
  name: ViMED_Chest_PETCT_Atlas_v2
  tags: ["vimed", "petct", "atlas", "chest", "multilabel", "v2", "shorter-run"]
  notes: "Shorter, more regularized ViMED chest PET/CT finetune to reduce overfitting."

main:
  exp_name: ViMED_Chest_PETCT_Atlas_v2
  monitor: val/macro_auroc

engine:
  max_epochs: 8

model:
  kwargs:
    head_models:
      classification:
        kwargs:
          dropout_rate: 0.2

optimizer:
  kwargs:
    lr: 5.0e-6
    weight_decay: 0.03

  scheduler:
    kwargs:
      warmup_epochs: 1
      max_epochs: 8
