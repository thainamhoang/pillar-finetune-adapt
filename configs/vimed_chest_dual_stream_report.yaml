# Phase B: Dual-stream PET/CT -> English report generator.
#
# Architecture (PETRG-3D arXiv:2511.20145 aligned):
#   1. Frozen Pillar0 CT + Pillar0 PET encoders (loaded from Phase A
#      export). Token concat fusion module from Phase A is bypassed --
#      Phase B does fusion at the LLM-prompt level via <ct> / <pet>
#      special tokens, NOT in the encoder.
#   2. Two independent Perceiver Resamplers: 128 queries x 1152, 6 layers.
#   3. Two independent vision -> LLM projection MLPs.
#   4. Frozen LLM (MedGemma 1.5 4B-IT by default) + LoRA r=8 alpha=32.
#
# Trained on Gemma-4-translated English reports; generates English. The
# original Vietnamese reports are documented in the dataset, but the LLM
# loss is computed over English tokens. See the methods section.
#
# REQUIRED BEFORE LAUNCHING:
#   1. Phase A exported encoder at
#      ./logs/dual-stream-pillar/fusion/dual_stream_encoder.pt
#      (see scripts/export_dual_stream_encoder.py)
#   2. HuggingFace access for the chosen LLM. For MedGemma you must accept
#      the Health AI Developer Foundations terms once at
#      huggingface.co/google/medgemma-1.5-4b-it.
#   3. peft + sacrebleu + rouge-score installed (pyproject.toml lists them).

experiment:
  name: dual-stream-pillar-report
  tags: ["pillar0", "chest", "petct", "report-generation", "medgemma"]
  notes: "Phase B: dual-stream PET/CT encoders -> LLM report decoder (MedGemma + LoRA)."

main:
  exp_name: dual-stream-pillar-report
  seed: 42
  log_dir: ./logs
  checkpoints_dir: /scratch/thahoa/PET/logs/dual-stream-pillar/report
  timestamp_save_dir: False

  disable_wandb: False
  wandb_offline: False
  wandb_project: dual-stream-pillar
  wandb_entity: thainamhoang

  ckpt_freq: 1
  # val/lm_loss is the early-stopping monitor instead of val/bleu_4
  # because BLEU on a small val set (276 samples) has high variance --
  # best.ckpt was bouncing between near-equivalent checkpoints. lm_loss
  # is monotonic enough to be a reliable minimum-tracker.
  monitor: val/lm_loss

  allow_overwriting_experiment_checkpoints: True
  find_unused_parameters: True
  force_loading_train_dataloader: False

  phases:
    train: True
    dev: True
    test: False

engine:
  type: ReportGenerator
  # Observed empirically on the eff=32 + eff=64 runs: val/lm_loss bottoms
  # out around epoch 13-17 and climbs from there. 30 epochs over-fits past
  # the minimum; cap at 20 so the last few save-cycles cluster near the
  # actual best. best.ckpt is monitored on val/lm_loss (see main.monitor)
  # so use it for inference -- the last/latest.ckpt is the over-fit tail.
  max_epochs: 20
  kwargs:
    resume: null
    # Distributed scale: 4x H100 with bs=4 per GPU * grad_accum=2 ->
    # effective batch 32. Sized for the ViMED chest train set (2206
    # samples), which gives 69 steps/epoch * 30 epochs = 2070 total
    # optimizer updates -- ~1.7x the PETRG-3D paper's 1240 updates on
    # the smaller PETRG-Lym set (660 train at eff=16). Healthy headroom
    # for Adam without saturating the data variety.
    #
    # Pushing further (eff=64 via accum=4) drops total updates to 1035
    # -- below the paper. Below ~500 updates AdamW's second-moment
    # buffer hasn't settled and LoRA stalls. Don't go there.
    #
    # For single-GPU debug runs: --opts dataloader.batch_size 1
    #   engine.kwargs.accumulate_grad_batches 32
    accumulate_grad_batches: 2
    precision: bf16-mixed
    log_interval: 25
    limit_num_batches: null
    eval_generate_n_batches: 2      # generate on first 2 val batches per epoch
    # Tightened from paper defaults after observing "Physiological X.
    # Physiological X." runaway loops at epoch 10 (PETRG-3D §D.5 + Fig. 8
    # describe the same failure mode on their baselines). Combined with
    # the EOR-supervision strengthening in DualStreamReportGenerator
    # ._build_train_inputs (post-EOR labels = EOR rather than -100, so
    # the model gets ~100x more EOR targets per sample) this kills the
    # runaway-repetition mode.
    # 256 caps the runaway harder. Chest reports in the ViMED training
    # set are 50-250 English tokens (per diagnostic of report_token_ids
    # length distribution). 256 is generous; if the model needs more, we
    # have a structural problem worth fixing rather than papering over.
    eval_generate_max_new_tokens: 256
    eval_generate_top_p: 0.9
    eval_generate_temperature: 0.5
    eval_generate_repetition_penalty: 1.15
    eval_generate_no_repeat_ngram_size: 4   # hard-block any 4-token repetition
    log_loss_components: False
    use_gpu_augs: False
    train_gpu_augs: []
    test_gpu_augs: []

dataloader:
  # Per-GPU batch size. Empirical floor measured: bs=1 -> 21 GB; static
  # ~12 GB + ~8 GB/sample activation. At bs=4 we sit at ~45 GB peak +
  # ~10 GB for eval-time KV cache = ~55 GB. H100 (80 GB) is the right
  # card: 25 GB headroom, no need for H200's 141 GB.
  # bs=8 (~85 GB peak) would push to H200 territory; see header comment
  # in engine block for why eff=64 isn't worth it on 2206 train samples.
  batch_size: 4
  eval_batch_size: 2                # generation's KV cache scales with bs; smaller is safer
  # 24 cpus-per-task / 4 ranks = 6 cpus per rank. 4 workers per rank
  # leaves headroom for the main+tokenizer threads.
  num_workers: 4
  class_bal: False
  # DDP needs even shards across ranks; dropping the last partial batch
  # avoids the uneven-last-batch edge case. ~600 train / 16 eff = 37 full
  # batches per epoch + 8 dropped samples (1.3% loss, acceptable).
  train_drop_last: True
  val_drop_last: False
  # Eval runs on each rank with the same (non-distributed) sampler so the
  # master rank can compute global NLG metrics without cross-rank gather.
  # 4x redundant eval work is the cost (~30s/epoch). Promote to True only
  # after we add gather_predictions_dict for the NLG accumulators.
  multi_gpu_eval: False
  persistent_workers: True          # 4 workers x 4 ranks = 16 procs, ~16 GB held
  prefetch_factor: 2
  pin_memory: True
  clip_grad: 1.0                    # LoRA training likes a moderate clip
  no_shuffle_training_set: False
  use_null_collate: False
  frac_train_samples: 1.0
  no_cache_misses_allowed: False

dataset:
  type: ViMedChestReportDataset

  shared_dataset_kwargs:
    csv_path: /scratch/thahoa/PET/ViMed_prep_v2/manifest_splits.csv
    region: chest
    # ---- Phase B tokenization ----
    llm_repo_id: google/medgemma-1.5-4b-it
    num_ct_queries: 128
    num_pet_queries: 128
    max_report_tokens: 512
    require_report: True
    # ---- SAMF (Style-Adaptive Multimodal Fusion, PETRG-3D §4.2) ----
    # Inject a gender-matched "healthy chest PET/CT" reference inside
    # <template>...</template> right after the visual tokens. Per
    # PETRG-3D Fig. 4 this is their single largest NLG-improving
    # component (+5.4 BLEU-4 / +5.95 ROUGE-L over DSFE-only). The
    # mechanism is style offloading: the LM gets report STYLE handed
    # to it as scaffolding, freeing its capacity to learn the
    # image -> deviation mapping.
    #
    # Single-center adaptation: PETRG-3D uses (Center_ID, Gender) keys
    # because they're multi-hospital; ViMED is single-center so only
    # gender matters here. Templates default to the bootstrap drafts in
    # pillar/datasets/vimed_chest_report.py CHEST_HEALTHY_TEMPLATES.
    # Override `healthy_templates` here if you get clinician-curated
    # versions later.
    #
    # Set use_samf=False for the ablation run that matches our previous
    # plateaued epoch-10 config.
    use_samf: True

model:
  type: DualStreamReportGenerator
  kwargs:
    # ---- Encoders (frozen) ----
    encoder_ckpt: ./logs/dual-stream-pillar/fusion/dual_stream_encoder.pt
    ct_channels: 11
    pet_channels: 4
    anatomy: chest_ct
    model_repo_id: YalaLab/Pillar0-ChestCT
    model_revision: main
    freeze_encoders: True
    token_dim: 1152
    # ---- Resamplers + projections ----
    num_ct_queries: 128
    num_pet_queries: 128
    resampler_depth: 6
    resampler_num_heads: 8
    resampler_ffn_mult: 4
    resampler_dropout: 0.0
    projection_dropout: 0.0
    # ---- LLM + LoRA ----
    llm_repo_id: google/medgemma-1.5-4b-it
    llm_torch_dtype: bfloat16
    apply_lora: True
    freeze_lm: True
    lora_r: 8
    lora_alpha: 32
    lora_dropout: 0.1
    # MedGemma uses standard q/k/v/o_proj names (Gemma family). For Qwen
    # change to ["q_proj", "k_proj", "v_proj", "o_proj"] (same) -- but
    # confirm via `model.named_modules()` before training.
    lora_target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
    # Class-weighted CE on the EOR target. ~1 EOR target per ~100 content
    # tokens; without weighting, content-prediction loss drowns out the
    # gradient teaching content->EOR transition. 50 means EOR contributes
    # ~33% of per-sample weighted loss. PETRG-3D §D.5 names the failure
    # mode but doesn't describe their fix mechanism; this is ours.
    eor_loss_weight: 50.0

optimizer:
  type: AdamW
  kwargs:
    # 5e-5 (paper default) was on 660 PETRG-Lym samples; we have 2206 chest
    # samples = 3.3x more data per epoch. The eff=32 + eff=64 runs both
    # over-fit around epoch 13-17 -- model learns the content distribution
    # faster than it learns the content->EOR transition. Lower lr buys
    # more useful updates before over-confidence sets in.
    lr: 2.0e-5
    weight_decay: 0.01

  scheduler:
    interval: epoch
    frequency: 1
    # Paper uses 100-step warmup then constant. pillar's ConstantWarmup
    # is in (fractional) epoch units, scaled via
    # adjust_learning_rate(batch_idx / len(dataloader) + epoch).
    # With ~600 ViMED chest train samples / effective_batch=16 = ~37
    # optimizer steps/epoch, 1 epoch of warmup ≈ 37 steps -- close enough
    # to the paper's 100-step intent without overcooking on our smaller set.
    type: ConstantWarmup
    kwargs:
      warmup_epochs: 1
      min_lr: 0.0

# No layer_decay: encoders are frozen, LLM is frozen, only resamplers +
# adapters + LoRA train. A flat LR is fine.

metrics:
  epoch_metrics:
    train: []
    val: []
    test: []
  # ReportGenerator engine computes LM loss directly from the model
  # output; no external loss function configured.
  losses: null
