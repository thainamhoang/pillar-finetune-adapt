# Phase 1 of the dual-stream pillar plan: CT-only fine-tune of the Pillar0-ChestCT
# Atlas encoder on ViMED chest CT windows (6 channels). The classification head
# over weak labels is a training proxy; the artifact downstream pipelines
# consume is the trained backbone state_dict.

experiment:
  name: dual-stream-pillar-ct
  tags: ["pillar0", "chest", "ct"]
  notes: "CT-only encoder fine-tune on ViMED chest weak labels. Phase 1 of the dual-stream plan."

main:
  exp_name: dual-stream-pillar-ct
  seed: 42
  log_dir: ./logs
  checkpoints_dir: ./logs/dual-stream-pillar/ct
  timestamp_save_dir: False

  disable_wandb: False
  wandb_offline: False
  wandb_project: dual-stream-pillar
  wandb_entity: thainamhoang

  ckpt_freq: 1
  monitor: val/macro_auroc

  allow_overwriting_experiment_checkpoints: True
  find_unused_parameters: True
  force_loading_train_dataloader: False

  phases:
    train: True
    dev: True
    test: False

engine:
  type: Classifier
  max_epochs: 8
  kwargs:
    resume: null
    accumulate_grad_batches: 1
    precision: bf16-mixed
    binary_pred: True
    log_loss_components: True
    log_interval: 25
    limit_num_batches: null
    use_gpu_augs: False
    train_gpu_augs: []
    test_gpu_augs: []

dataloader:
  batch_size: 1
  eval_batch_size: 1
  num_workers: 8
  class_bal: False
  train_drop_last: False
  val_drop_last: False
  multi_gpu_eval: False
  persistent_workers: True
  prefetch_factor: 2
  clip_grad: null
  no_shuffle_training_set: False
  use_null_collate: False
  frac_train_samples: 1.0
  no_cache_misses_allowed: False

dataset:
  type: ViMedChestSingleModalityDataset
  modality: CT
  num_classes: 8

  shared_dataset_kwargs:
    csv_path: /scratch/thahoa/PET/ViMed_prep_v2/manifest_splits.csv
    region: chest
    channels_mode: ct
    anatomy: "chest_ct"
    # The dataset already returns 6-channel windowed CT volumes, so the
    # engine's GPU-side windowing must be skipped (null is falsy).
    windows: null
    label_columns:
      - abnormal_fdg_uptake
      - lymph_node
      - mass_or_nodule
      - metastasis_or_recurrence
      - inflammation_or_hyperplasia
      - suv_mentioned
      - effusion_or_fluid
      - no_abnormal_fdg

model:
  type: MultiStage
  kwargs:
    pool_name: MultiAttentionPool
    pool_kwargs:
      hidden_dim: 1152
      conv_pool_kernel_size: 6

    backbone_model_type: MultimodalAtlas
    backbone_kwargs:
      pretrained: True
      model_repo_id: YalaLab/Pillar0-ChestCT
      model_revision: main
      input_channels: 6
      extra_channel_init: zero

    head_models:
      classification:
        type: Linear
        kwargs:
          input_dim: 1152
          output_dim: 8
          dropout_rate: 0.2
        apply_pooling: True
        use_pooled_features: False
        enable_at_eval: True

optimizer:
  type: AdamW
  kwargs:
    lr: 5.0e-6
    weight_decay: 0.03

  scheduler:
    interval: epoch
    frequency: 1
    type: CosineAnnealingWarmup
    kwargs:
      min_lr: 1.0e-6
      warmup_epochs: 2
      max_epochs: 8

  layer_decay: 0.9

metrics:
  epoch_metrics:
    train: &base_metrics
      - type: MultilabelMetric
        kwargs:
          logit_key: classification
          target_key: y
          threshold: 0.5
          label_names:
            - abnormal_fdg_uptake
            - lymph_node
            - mass_or_nodule
            - metastasis_or_recurrence
            - inflammation_or_hyperplasia
            - suv_mentioned
            - effusion_or_fluid
            - no_abnormal_fdg
    val: *base_metrics
    test: *base_metrics

  losses:
    - type: MultilabelBCELoss
      weight: 1.0
      kwargs:
        logit_key: classification
        target_key: y
